<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Unova Founder Dashboard</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="mark">UN</span>
          <div>
            <p>Unova</p>
            <h1>Founder Dashboard</h1>
          </div>
        </div>

        <nav class="nav">
          <button class="active" type="button" data-view="players">Players</button>
          <button type="button" data-view="actions">Actions</button>
        </nav>

        <section class="status-strip">
          <span id="serverName">Unova</span>
          <strong id="serverCount">0 / 0</strong>
          <small id="serverUpdated">Waiting for FiveM</small>
        </section>
      </aside>

      <section class="content">
        <section id="loginView" class="login-view">
          <form id="loginForm" class="login-panel">
            <h2>Founder Login</h2>
            <label for="founderKey">Founder key</label>
            <input id="founderKey" name="founderKey" type="password" autocomplete="current-password" required>
            <button type="submit">Unlock Dashboard</button>
            <p id="loginError"></p>
          </form>
        </section>

        <section id="appView" class="app-view hidden">
          <header class="toolbar">
            <div>
              <p id="authLabel">Founder access</p>
              <h2>Live Moderation</h2>
            </div>
            <div class="toolbar-actions">
              <button id="refreshButton" type="button">Refresh</button>
              <button id="logoutButton" type="button">Lock</button>
            </div>
          </header>

          <section id="playersView" class="workspace">
            <section class="player-table">
              <div class="table-head">
                <span>Player</span>
                <span>FiveM ID</span>
                <span>Discord</span>
                <span>Ping</span>
              </div>
              <div id="playersList" class="table-body"></div>
            </section>

            <aside class="moderation-panel">
              <div id="emptySelection" class="empty-state">Select an online player.</div>
              <div id="selectedPanel" class="hidden">
                <div class="selected-player">
                  <span id="selectedName"></span>
                  <small id="selectedMeta"></small>
                </div>

                <label for="reason">Reason</label>
                <textarea id="reason" rows="6" placeholder="Required"></textarea>

                <div class="action-grid">
                  <button class="warn" type="button" data-action="warn">Warn</button>
                  <button class="kick" type="button" data-action="kick">Kick</button>
                  <button class="ban" type="button" data-action="ban">Ban</button>
                </div>

                <p id="actionNotice"></p>
              </div>
            </aside>
          </section>

          <section id="actionsView" class="actions-view hidden">
            <div class="section-heading">
              <h3>Recent Actions</h3>
              <span id="queueCount">Queue 0</span>
            </div>
            <div id="actionsList" class="actions-list"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
