<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Unova Admin Panel</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main id="panel" class="panel hidden">
      <header class="topbar">
        <div class="brand">
          <img src="https://r2.fivemanage.com/O8nsC8f5nKWaQAbWhOnvx/IMG_1324.PNG" alt="">
          <div>
          <p class="eyebrow">Unova</p>
          <h1>Admin Panel</h1>
          </div>
        </div>
        <div class="actions">
          <button id="refresh" type="button">Refresh</button>
          <button id="close" type="button">Close</button>
        </div>
      </header>

      <section class="layout">
        <aside class="players">
          <div class="section-title">Online Players</div>
          <div id="players" class="player-list"></div>
          <div id="ticketsPanel" class="tickets-panel hidden">
            <div class="section-title">Ongoing Tickets</div>
            <div id="tickets" class="ticket-list"></div>
          </div>
        </aside>

        <section class="details">
          <div id="empty" class="empty">Select a player to warn, kick, or ban.</div>
          <div id="moderation" class="moderation hidden">
            <div class="player-card">
              <span id="playerName"></span>
              <small id="playerMeta"></small>
            </div>

            <label for="reason">Reason</label>
            <textarea id="reason" rows="5" placeholder="Required reason"></textarea>

            <div class="moderation-actions">
	              <button class="warn" data-action="warn" type="button">Warn</button>
	              <button class="kick" data-action="kick" type="button">Kick</button>
	              <button class="ban" data-action="ban" type="button">Ban</button>
	              <button class="revive" data-action="revive" type="button">Revive</button>
	            </div>

            <p id="notice" class="notice"></p>
          </div>
          <form id="reportForm" class="moderation hidden">
            <div class="player-card">
              <span>Golden Lottery Ticket</span>
              <small>Report a city incident without breaking immersion.</small>
            </div>

            <label for="offenderPlayerId">Player ID In City</label>
            <input id="offenderPlayerId" name="offenderPlayerId" type="number" min="1" required>

            <label for="bodycamUrl">Bodycam Link</label>
            <input id="bodycamUrl" name="bodycamUrl" type="url" required>

            <label for="description">What Happened</label>
            <textarea id="description" name="description" rows="5" required></textarea>

            <button class="report-submit" type="submit">Open Golden Lottery Ticket</button>
            <p id="reportNotice" class="notice"></p>
          </form>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
